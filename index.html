<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart English Roadmap 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 pb-20">

    <div class="max-w-4xl mx-auto py-10 px-6">
        <header class="text-center mb-12">
            <span class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest">Global Requirement</span>
            <h1 class="text-5xl font-black text-slate-900 mt-4 tracking-tight">English Roadmap 2026</h1>
            <p class="text-slate-500 mt-4 text-lg">From learner to certified professional: Your total immersion plan.</p>
        </header>

        <div id="setup" class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">When do you start?</label>
                    <input type="date" id="startDate" class="w-full p-4 bg-slate-50 border rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Target Goal</label>
                    <select id="goal" class="w-full p-4 bg-slate-50 border rounded-2xl">
                        <option value="B2">B2 - First Certificate</option>
                        <option value="C1">C1 - Advanced</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Learning Background</label>
                    <select id="background" class="w-full p-4 bg-slate-50 border rounded-2xl">
                        <option value="school">School / High School</option>
                        <option value="academy">Private Academy</option>
                        <option value="travel">Traveling / Living abroad</option>
                        <option value="self">Self-taught / Personal interest</option>
                    </select>
                </div>
            </div>
            <button onclick="buildRoadmap()" class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-transform hover:scale-[1.02]">
                Generate My Personal Roadmap
            </button>
        </div>

        <div id="roadmapResult" class="hidden">
            <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-xl mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h2 class="text-2xl font-bold">Your 30-Day Immersion Plan</h2>
                    <p id="profileTip" class="text-blue-100 text-sm mt-1"></p>
                </div>
                <button onclick="downloadICS()" class="flex items-center gap-2 bg-white text-blue-600 px-6 py-3 rounded-xl font-bold shadow-md hover:bg-blue-50 transition-all">
                    📥 Export to Google Calendar
                </button>
            </div>

            <div id="calendarGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>

            <button onclick="location.reload()" class="w-full mt-10 py-3 text-slate-400 text-sm hover:underline italic">Restart analysis and try a new date</button>
        </div>
    </div>

    <script>
        document.getElementById('startDate').valueAsDate = new Date();
        let planData = [];

        const taskDatabase = {
            1: "Vocabulary: Install Anki and learn 50 new words",
            2: "Reading: Read 5 pages of an English book/article",
            5: "Immersion: Watch a movie in VO (No subtitles allowed)",
            10: "Writing: Write a structured post on an English Reddit sub",
            15: "Grammar: Master the Verb Tenses (B2/C1 structures)",
            20: "Listening: Listen to a 20-min podcast and summarize it",
            25: "Mock Exam: Complete a full official Reading sample",
            30: "Social Challenge: Join a Discord Voice Channel and speak for 30 min"
        };

        const tips = {
            self: "Since you are self-taught, we've boosted formal grammar sessions.",
            travel: "Your travel experience is great! Focus now on academic writing.",
            school: "Moving past school English: Let's focus on real-world fluency.",
            academy: "Use your academy base to master advanced exam strategies."
        };

        function buildRoadmap() {
            const start = new Date(document.getElementById('startDate').value);
            const bg = document.getElementById('background').value;
            const grid = document.getElementById('calendarGrid');
            
            document.getElementById('profileTip').innerText = tips[bg];
            grid.innerHTML = '';
            planData = [];

            for (let i = 1; i <= 30; i++) {
                let date = new Date(start);
                date.setDate(start.getDate() + (i - 1));
                
                let task = taskDatabase[i] || "Skill reinforcement & Daily fluency practice";
                planData.push({ day: i, date: new Date(date), task: task });

                grid.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm hover:border-blue-300 transition-colors">
                        <div class="flex justify-between items-start mb-3">
                            <span class="bg-blue-50 text-blue-600 text-[10px] font-black px-2 py-0.5 rounded uppercase">Day ${i}</span>
                            <span class="text-[10px] text-slate-400 font-mono">${date.toDateString()}</span>
                        </div>
                        <p class="text-sm font-bold text-slate-800">${task}</p>
                    </div>
                `;
            }
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('roadmapResult').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function downloadICS() {
            let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Smart English AI//Study Plan//EN\n";
            
            planData.forEach(item => {
                let dateStr = item.date.toISOString().replace(/-|:|\.\d+/g, "").split("T")[0];
                icsContent += "BEGIN:VEVENT\n";
                icsContent += `DTSTART;VALUE=DATE:${dateStr}\n`;
                icsContent += `SUMMARY:English Day ${item.day}: ${item.task}\n`;
                icsContent += "DESCRIPTION:Daily task for your certification plan.\n";
                icsContent += "END:VEVENT\n";
            });

            icsContent += "END:VCALENDAR";

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', 'my_english_plan.ics');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
